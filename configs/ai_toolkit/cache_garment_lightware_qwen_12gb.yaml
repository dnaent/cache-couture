---
job: extension
config:
  name: "cache_garment_lightware"
  process:
    - type: 'sd_trainer'
      training_folder: "C:\\Users\\Yoshii\\cache_couture\\outputs\\loras\\garments"
      device: cuda:0
      trigger_word: "lightware_set"
      network:
        type: "lora"
        linear: 16
        linear_alpha: 16
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4
        # Final LoRA promoted to the ComfyUI registry by hand or by a future
        # scripts/finalize_garment_lora.py — do not point training_folder at
        # the ComfyUI dir directly, the intermediate checkpoints would
        # pollute the registry.
      datasets:
        - folder_path: "C:\\Users\\Yoshii\\cache_couture\\brand\\garments\\lightware\\training_set"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [ 768, 1024 ]
      train:
        batch_size: 1
        cache_text_embeddings: true
        steps: 2000
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 1e-4
        dtype: bf16
      model:
        name_or_path: "Qwen/Qwen-Image"
        arch: "qwen_image"
        quantize: true
        qtype: "uint3|ostris/accuracy_recovery_adapters/qwen_image_torchao_uint3.safetensors"
        quantize_te: true
        qtype_te: "qfloat8"
        low_vram: true
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 768
        height: 1024
        prompts:
          - "[trigger], floating garment studio mockup, Caché Couture, stealth black streetwear, on warm bone seamless backdrop, soft even diffused front fill, no model, matte technical fabrics, gunmetal hardware, subtle reflective yarn highlights, 35mm, magazine grade"
          - "[trigger], floating garment studio mockup, Caché Couture, stealth black streetwear, on off-black seamless backdrop, soft even diffused front fill, no model, matte technical fabrics, gunmetal hardware, iridescent seam membranes catching light, 35mm, magazine grade"
          - "[trigger], full body, three-quarter angle, model wearing the garment, on warm bone seamless backdrop, soft diffused light"
        neg: "saturated colours, neon, bright background, vibrant, sunset lighting, visible logo text, watermark, harsh shadows, low resolution, plastic skin, AI artefacts, extra fingers, distorted face, warped hands, cluttered background, props, motion blur, sepia, vintage filter"
        seed: 42
        walk_seed: true
        guidance_scale: 3
        sample_steps: 20
meta:
  name: "cache_garment_lightware"
  version: '1.0'

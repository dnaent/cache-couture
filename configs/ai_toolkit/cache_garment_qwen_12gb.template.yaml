---
# === TEMPLATE HEADER — STRIPPED BY render_garment_configs.py ===
# Caché garment LoRA — Qwen Image, 12 GB VRAM tier (RTX 3080 Ti)
#
# C2/C3/C4 collection garment LoRA. Trained on floating-garment studio plates
# rendered on BOTH brand backdrops (off-black #0A0A0A and bone #FAFAF7) so the
# reflective physics travel with the garment — backdrop is then a prompt
# fragment at inference, not a separate LoRA.
#
# Derived from the face template (cache_face_qwen_12gb.template.yaml).
# Adjustments vs the face template: resolution bucket [768, 1024] (garments
# need more texture detail than faces — drop to [512, 768] if 1024 OOMs on
# 12 GB even with uint3 + qfloat8 + low_vram + cache_text_embeddings); trigger
# is "<collection>_set" instead of "m##_face"; dataset points at
# brand/garments/<collection>/training_set/; sample prompts feature floating
# garments on both backdrops to verify the dual-backdrop generalisation.
#
# DO NOT EDIT a rendered per-collection config by hand — regenerate via
# scripts/render_garment_configs.py. Token replacement: __COLLECTION__
# (lowercase, e.g. "lightware"), __TRIGGER__ ("<collection>_set").
# === END TEMPLATE HEADER ===

job: extension
config:
  name: "cache_garment___COLLECTION__"
  process:
    - type: 'sd_trainer'
      training_folder: "C:\\Users\\Yoshii\\cache_couture\\outputs\\loras\\garments"
      device: cuda:0
      trigger_word: "__TRIGGER__"
      network:
        type: "lora"
        linear: 16
        linear_alpha: 16
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 4
        # Final LoRA promoted to the ComfyUI registry by hand or by a future
        # scripts/finalize_garment_lora.py — do not point training_folder at
        # the ComfyUI dir directly, the intermediate checkpoints would
        # pollute the registry.
      datasets:
        - folder_path: "C:\\Users\\Yoshii\\cache_couture\\brand\\garments\\__COLLECTION__\\training_set"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          shuffle_tokens: false
          cache_latents_to_disk: true
          resolution: [ 768, 1024 ]
      train:
        batch_size: 1
        cache_text_embeddings: true
        steps: 2000
        gradient_accumulation: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"
        optimizer: "adamw8bit"
        lr: 1e-4
        dtype: bf16
      model:
        name_or_path: "Qwen/Qwen-Image"
        arch: "qwen_image"
        quantize: true
        qtype: "uint3|ostris/accuracy_recovery_adapters/qwen_image_torchao_uint3.safetensors"
        quantize_te: true
        qtype_te: "qfloat8"
        low_vram: true
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 768
        height: 1024
        prompts:
          - "[trigger], floating garment studio mockup, Caché Couture, stealth black streetwear, on warm bone seamless backdrop, soft even diffused front fill, no model, matte technical fabrics, gunmetal hardware, subtle reflective yarn highlights, 35mm, magazine grade"
          - "[trigger], floating garment studio mockup, Caché Couture, stealth black streetwear, on off-black seamless backdrop, soft even diffused front fill, no model, matte technical fabrics, gunmetal hardware, iridescent seam membranes catching light, 35mm, magazine grade"
          - "[trigger], full body, three-quarter angle, model wearing the garment, on warm bone seamless backdrop, soft diffused light"
        neg: "saturated colours, neon, bright background, vibrant, sunset lighting, visible logo text, watermark, harsh shadows, low resolution, plastic skin, AI artefacts, extra fingers, distorted face, warped hands, cluttered background, props, motion blur, sepia, vintage filter"
        seed: 42
        walk_seed: true
        guidance_scale: 3
        sample_steps: 20
meta:
  name: "cache_garment___COLLECTION__"
  version: '1.0'
